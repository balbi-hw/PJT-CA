<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카드 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">카드 등록</h1>

    <form action="/cards/new" method="post">
        <div class="mb-3">
            <label for="deckId" class="form-label">덱</label>
            <select id="deckId" name="deckId" class="form-select" required>
                <option value="">덱을 선택하세요</option>
                <option th:each="deck : ${decks}"
                        th:value="${deck.id}"
                        th:selected="${selectedDeckId != null and selectedDeckId == deck.id}"
                        th:text="${deck.name}">영단어</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="word" class="form-label">단어</label>
            <input type="text" id="word" name="word" class="form-control" placeholder="예: apple" required>
        </div>

        <div class="mb-3">
            <label for="meaning" class="form-label">뜻</label>
            <input type="text" id="meaning" name="meaning" class="form-control" placeholder="예: 사과" required>
        </div>

        <button type="submit" class="btn btn-warning">등록</button>
        <a href="/cards" class="btn btn-outline-secondary">취소</a>
    </form>
</div>
</body>
</html>
