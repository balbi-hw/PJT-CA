<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카드 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>
            <span th:if="${deck == null}">전체 카드 목록</span>
            <span th:if="${deck != null}" th:text="|${deck.name} 카드 목록|">덱 카드 목록</span>
        </h1>
        <div>
            <a class="btn btn-outline-secondary" href="/">홈</a>
            <a class="btn btn-outline-secondary" href="/decks">덱 목록</a>
            <a class="btn btn-warning" href="/cards/new">카드 등록</a>
        </div>
    </div>

    <table class="table table-bordered align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>단어</th>
            <th>뜻</th>
            <th>덱</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="card : ${cards}">
            <td th:text="${card.id}">1</td>
            <td th:text="${card.word}">apple</td>
            <td th:text="${card.meaning}">사과</td>
            <td th:text="${card.deck.name}">영단어</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
