<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>덱 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">덱 등록</h1>

    <form action="/decks/new" method="post">
        <div class="mb-3">
            <label for="memberId" class="form-label">소유 회원</label>
            <select id="memberId" name="memberId" class="form-select" required>
                <option value="">회원을 선택하세요</option>
                <option th:each="member : ${members}"
                        th:value="${member.id}"
                        th:text="${member.name}">현우</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="name" class="form-label">덱 이름</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="예: JLPT N2 단어" required>
        </div>

        <button type="submit" class="btn btn-success">등록</button>
        <a href="/decks" class="btn btn-outline-secondary">취소</a>
    </form>
</div>
</body>
</html>
