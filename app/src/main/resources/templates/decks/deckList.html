<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>덱 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>덱 목록</h1>
        <div>
            <a class="btn btn-outline-secondary" href="/">홈</a>
            <a class="btn btn-success" href="/decks/new">덱 등록</a>
        </div>
    </div>

    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>덱 이름</th>
            <th>소유 회원</th>
            <th>카드 수</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="deck : ${decks}">
            <td th:text="${deck.id}">1</td>
            <td th:text="${deck.name}">영단어</td>
            <td th:text="${deck.member.name}">현우</td>
            <td th:text="${deck.size}">0</td>
            <td>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/cards(deckId=${deck.id})}">카드 보기</a>
                <a class="btn btn-sm btn-outline-success" th:href="@{/cards/new(deckId=${deck.id})}">카드 추가</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
